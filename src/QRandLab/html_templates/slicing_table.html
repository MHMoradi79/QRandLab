<div class="report-container">
  <div class="report-header">Slicing Operations</div>
  <div class="card">
    <table>
      <tr>
        <th>Time</th>
        <th>Operation</th>
        <th>Input File</th>
        <th>Parameters</th>
        <th>Output File</th>
        <th>Status</th>
      </tr>
      {% for op in operations %}
      <tr>
        <td>{{ op.timestamp }}</td>
        <td>{{ op.operation }}</td>
        <td>{{ op.input_file }}</td>
        <td>{{ op.parameters }}</td>
        <td>{{ op.output_file }}</td>
        <td>{{ op.status_text }}</td>
      </tr>
      {% endfor %}
    </table>
  </div>
</div>

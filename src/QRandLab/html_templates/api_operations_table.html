<div class="report-container">
  <div class="report-header">API Operations</div>
  <div class="card">
    <table>
      <tr>
        <th>Time</th>
        <th>Provider</th>
        <th>Data Type</th>
        <th>Length</th>
        <th>Output File</th>
        <th>Status</th>
      </tr>
      {% for op in operations %}
      <tr>
        <td>{{ op.timestamp }}</td>
        <td>{{ op.provider }}</td>
        <td>{{ op.data_type }}</td>
        <td>{{ op.length }}</td>
        <td>{{ op.output_file }}</td>
        <td>{{ op.status_text }}</td>
      </tr>
      {% endfor %}
    </table>
  </div>
</div>
